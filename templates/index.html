<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indian House Price Prediction</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="wrapper">

    <div class="card">

        <div class="header">

            <i class="fa-solid fa-house"></i>

            <h1>Indian House Price Prediction</h1>

            <p>
                Predict property prices using Machine Learning
            </p>

        </div>

        <form action="/predict" method="POST">

            <div class="row">

                <div class="input-box">

                    <label>

                        <i class="fa-solid fa-location-dot"></i>

                        State

                    </label>

                    <select id="state" name="State" required>
                       {% for state in states %}
                         <option value="{{ state }}">{{ state }}</option>
                       {% endfor %}
                    </select>

                </div>

                <div class="input-box">

                    <label>

                        <i class="fa-solid fa-city"></i>

                        City

                    </label>

                    <select id="city" name="City" required>
                       <option value="">Select City</option>
                   </select>

                </div>

            </div>

            <div class="row">

                <div class="input-box">

                    <label>

                        <i class="fa-solid fa-building"></i>

                        Property Type

                    </label>

                    <select name="Property_Type" required>
                        {% for property in property_types %}
                          <option value="{{ property }}">{{ property }}</option>
                       {% endfor %}
                   </select>

                </div>

                <div class="input-box">

                    <label>

                        <i class="fa-solid fa-bed"></i>

                        BHK

                    </label>

                    <input
                        type="number"
                        name="BHK"
                        placeholder="3"
                        min="1"
                        required>

                </div>

            </div>

            <div class="row">

                <div class="input-box full">

                    <label>

                        <i class="fa-solid fa-ruler-combined"></i>

                        Size (SqFt)

                        <small>(Optional)</small>

                    </label>

                    <input
                        type="number"
                        name="Size_in_SqFt"
                        placeholder="Leave blank if unknown">

                </div>

            </div>

           <button id="predictBtn">

               <i class="fa-solid fa-chart-line"></i>

               Predict House Price

            </button>

        </form>

        {% if prediction %}

        <div class="prediction">

            <h3>

                <i class="fa-solid fa-indian-rupee-sign"></i>

                Estimated Price

            </h3>

            <h1>

                {{ prediction }}

            </h1>

        </div>

        {% endif %}

    </div>

</div>

<script>

const stateSelect = document.getElementById("state");
const citySelect = document.getElementById("city");

function loadCities(state){

    fetch("/get_cities/" + encodeURIComponent(state))

    .then(response => response.json())

    .then(data => {

        citySelect.innerHTML = "";

        let option = document.createElement("option");
        option.value = "";
        option.text = "Select City";

        citySelect.appendChild(option);

        data.forEach(city => {

            let opt = document.createElement("option");

            opt.value = city;
            opt.text = city;

            citySelect.appendChild(opt);

        });

    });

}

stateSelect.addEventListener("change", function(){

    loadCities(this.value);

});

// Load cities for the default selected state
window.onload = function(){

    loadCities(stateSelect.value);

}

</script>

</script>

</body>

</html>
